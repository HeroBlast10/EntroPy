# ============================================================
# Experiment: US Baseline
# ============================================================
# Standard cross-sectional multi-factor portfolio.
# Use as the control group for ablation studies.

experiment:
  name: "us_baseline"
  description: "Standard CS factors (momentum + volatility + liquidity), long-only quintile, monthly rebalance"

data:
  start: "2010-01-01"
  end: "2024-12-31"
  universe: "sp500"
  exchange: "XNYS"

factors:
  signal_type: "cross_sectional"
  names: ["MOM_12_1M", "STR_1M", "VOL_20D", "ILLIQ_AMIHUD"]
  winsorize: [0.01, 0.99]
  zscore: true
  neutralize: null

portfolio:
  method: "quantile"
  mode: "long_only"
  weight_scheme: "equal"
  rebalance_freq: "M"
  n_quantiles: 5
  long_quantile: 5
  max_stock_weight: 0.05
  max_sector_weight: 0.30

multi_factor:
  method: "rolling_icir"
  lookback: 126
  return_col: "fwd_ret_1d"

redundancy:
  enabled: true
  min_factors: 3
  max_factors: 5
  max_signal_corr: 0.70
  max_return_corr: 0.70
  max_exposure_similarity: 0.80
  min_incremental_sharpe: 0.0

backtest:
  initial_capital: 1000000
  benchmark_market: "us"
  risk_free_rate: 0.0
  capacity_capitals: [1000000, 5000000, 10000000, 50000000]

costs:
  model: "us_equity"
  slippage_bps: 5.0
  impact_coeff: 0.1
  impact_exponent: 0.5
  commission_per_share: 0.005

evaluation:
  walkforward:
    train_months: 36
    test_months: 12
    step_months: 12
