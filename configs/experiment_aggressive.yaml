# ============================================================
# Experiment: Aggressive
# ============================================================
# Long-short, weekly rebalance, optimised portfolio.
# Higher expected return but also higher cost and risk.

experiment:
  name: "aggressive"
  description: "Long-short optimised, weekly rebalance, concentrated"

data:
  start: "2010-01-01"
  end: "2024-12-31"
  universe: "sp500"

factor:
  signal: "MOM_12_1M"
  winsorize: [0.01, 0.99]
  zscore: true
  neutralize: null

portfolio:
  method: "optimize"
  mode: "long_short"
  weight_scheme: "signal"
  rebalance_freq: "W"
  n_quantiles: 5
  long_quantile: 5
  short_quantile: 1
  max_stock_weight: 0.05
  max_sector_weight: 0.30
  risk_aversion: 1.0
  cov_shrinkage: 0.5

costs:
  slippage_bps: 5.0
  impact_coeff: 0.1
  impact_exponent: 0.5
  commission_per_share: 0.005
  borrow_rate_annual: 0.01     # higher borrow for short book

evaluation:
  walkforward:
    train_months: 36
    test_months: 6
    step_months: 6
