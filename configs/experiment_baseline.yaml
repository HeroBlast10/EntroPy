# ============================================================
# Experiment: Baseline
# ============================================================
# Standard multi-factor long-only portfolio with default parameters.
# Use this as the control group for all ablation studies.

experiment:
  name: "baseline"
  description: "Standard MOM_12_1M long-only quintile portfolio, monthly rebalance"

data:
  start: "2010-01-01"
  end: "2024-12-31"
  universe: "sp500"

factor:
  signal: "MOM_12_1M"
  winsorize: [0.01, 0.99]
  zscore: true
  neutralize: null

portfolio:
  method: "quantile"
  mode: "long_only"
  weight_scheme: "equal"
  rebalance_freq: "M"
  n_quantiles: 5
  long_quantile: 5
  max_stock_weight: 0.05
  max_sector_weight: 0.30

costs:
  slippage_bps: 5.0
  impact_coeff: 0.1
  impact_exponent: 0.5
  commission_per_share: 0.005
  borrow_rate_annual: 0.005

evaluation:
  walkforward:
    train_months: 36
    test_months: 12
    step_months: 12
