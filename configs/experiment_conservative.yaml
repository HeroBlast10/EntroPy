# ============================================================
# Experiment: Conservative
# ============================================================
# Lower risk, lower turnover, tighter constraints.
# Suitable for demonstrating robustness to parameter choices.

experiment:
  name: "conservative"
  description: "Low-turnover, tightly constrained, market-cap weighted"

data:
  start: "2010-01-01"
  end: "2024-12-31"
  universe: "sp500"

factor:
  signal: "MOM_12_1M"
  winsorize: [0.02, 0.98]
  zscore: true
  neutralize: null

portfolio:
  method: "quantile"
  mode: "long_only"
  weight_scheme: "market_cap"
  rebalance_freq: "M"
  n_quantiles: 5
  long_quantile: 5
  max_stock_weight: 0.03
  max_sector_weight: 0.25
  max_turnover: 0.20

costs:
  slippage_bps: 5.0
  impact_coeff: 0.1
  impact_exponent: 0.5
  commission_per_share: 0.005
  borrow_rate_annual: 0.005

evaluation:
  walkforward:
    train_months: 48
    test_months: 12
    step_months: 12
